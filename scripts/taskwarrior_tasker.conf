# Configuration for Taskwarrior Tasker notification scripts.
# Copy this file to ~/.termux/tasker/taskwarrior_tasker.conf and edit it there.

# Pending tasks due from now - past hours through now + future hours are shown.
TW_WINDOW_PAST_HOURS=2
TW_WINDOW_FUTURE_HOURS=2

# Maximum number of task notifications to show.
TW_MAX_TASKS=12

# Set to 1 to print what would be posted without creating notifications.
TW_DRY_RUN=0

# Set to 1 to remove and repost matching notifications every scan so Android
# keeps the closest due task on top. This may visibly refresh notifications.
TW_REORDER_EACH_RUN=0

# Quiet hours use local phone time in HH:MM format. Set enabled to 1 to skip
# posting notifications during the quiet window. Ranges may cross midnight.
TW_QUIET_HOURS_ENABLED=0
TW_QUIET_HOURS_START=22:00
TW_QUIET_HOURS_END=07:00

# Group task notifications under Android notification groups. Some Android
# versions only visually collapse groups when a summary notification exists.
TW_EXECUTION_NOTIFICATION_GROUP=taskwarrior-window
TW_OVERDUE_NOTIFICATION_GROUP=taskwarrior-overdue
TW_GROUP_SUMMARY_ENABLED=0
TW_EXECUTION_GROUP_SUMMARY_ID=999000
TW_OVERDUE_GROUP_SUMMARY_ID=999001

# Material icon names used by termux-notification.
TW_EXECUTION_NOTIFICATION_ICON=event_note
TW_OVERDUE_NOTIFICATION_ICON=warning

# Commands and paths. Defaults should work when all scripts live in ~/.termux/tasker.
TASK_BIN=task
TW_COMPLETE_SCRIPT="$HOME/.termux/tasker/taskwarrior_complete_task.sh"
TW_FORGET_SCRIPT="$HOME/.termux/tasker/taskwarrior_forget_notification.sh"
TW_SNOOZE_SCRIPT="$HOME/.termux/tasker/taskwarrior_snooze_task.sh"
TW_START_STOP_SCRIPT="$HOME/.termux/tasker/taskwarrior_start_stop_task.sh"
TW_NOTIFY_SCRIPT="$HOME/.termux/tasker/taskwarrior_notify_due_tasks.sh"

# Snooze behavior:
# - local: hide the notification locally until the snooze expires.
# - modify_due: modify the Taskwarrior task due date.
TW_SNOOZE_1H_MODE=local
TW_SNOOZE_TOMORROW_MODE=modify_due

# Notification action buttons are limited to three by termux-notification.
# Button 1 is used as a Taskwarrior Start/Stop toggle when enabled.
TW_START_STOP_ACTION_ENABLED=1

# Optional jot timelog integration. When enabled:
# - Start button runs: jot timelog start <uuid>
# - Stop button and Done button run: jot timelog stop <uuid>
TW_JOT_TIMELOG_ENABLED=1
JOT_BIN=/data/data/com.termux/files/usr/bin/jot
# Optional. Set to python3/bash/etc if jot has a /usr/bin/env shebang that
# fails from Android notification actions. Empty means auto-detect.
JOT_RUNNER=
TW_ACTION_LOG_FILE="${XDG_STATE_HOME:-$HOME/.local/state}/taskwarrior-tasker-notification/action.log"
TW_ACTION_TOAST_ENABLED=1

# Visual polish for started Taskwarrior tasks.
TW_STARTED_NOTIFICATION_ICON=play_arrow
TW_NOTIFICATION_PRIORITY=high
TW_STARTED_NOTIFICATION_PRIORITY=high
# When Start is pressed, remove that task notification and post it after the
# normal scan order so Android usually displays the active task on top.
TW_PROMOTE_STARTED_ON_START=1

# State path for active notification ids.
TW_STATE_DIR="${XDG_STATE_HOME:-$HOME/.local/state}/taskwarrior-tasker-notification"

# GUI startup cache. Notification scans write this cache, and the GUI reads it
# first when it is fresh. Set max age to 0 to always run a live Taskwarrior export.
TW_GUI_CACHE_FILE="${TW_STATE_DIR}/gui-cache.json"
TW_GUI_CACHE_MAX_AGE_SECONDS=900
